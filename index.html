<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Business Generator | wajidtechs.com | WajidTechs | BizBooster | biz.prebookings.shop</title>

    <link rel="stylesheet" href="./style.css">
</head>

<body>

<div class="wrapper">

    <!-- LEFT SIDE -->
    <div class="left">
        <div class="badge">⚡ AI Business Builder</div>

        <h1>Create Your Business Website in Seconds</h1>

        <p>
            Build a professional business profile with images, logo, and business details.
            Get a ready-made website instantly powered by WajidTechs.
        </p>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right">

        <h2>🚀 Business Setup</h2>

        <form action="https://deals.wajidtechs.com/bizbox/save_biz" method="POST" enctype="multipart/form-data">

            <div>
                <label>User Name</label>
                <input type="text" name="username" placeholder="Enter username">
            </div>

            <div>
                <label>Business Name *</label>
                <input type="text" name="business_name" placeholder="My Business" required>
            </div>

            <div>
                <label>Mobile *</label>
                <input type="text" name="mobile" placeholder="+91..." required>
            </div>

            <div>
                <label>Email</label>
                <input type="email" name="email" placeholder="email@example.com">
            </div>

            <div class="full">
                <label>Location</label>
                <input type="text" name="location" placeholder="City / Area">
            </div>

            <div class="full">
                <label>Address</label>
                <textarea name="address" placeholder="Full business address"></textarea>
            </div>

            <div class="full">
                <label>Description</label>
                <textarea name="description" placeholder="About your business"></textarea>
            </div>

            <div>
                <label>Logo</label>
                <input class="file" type="file" name="logo">
            </div>

            <div>
                <label>Image 1</label>
                <input class="file" type="file" name="image1">
            </div>

            <div>
                <label>Image 2</label>
                <input class="file" type="file" name="image2">
            </div>

            <div>
                <label>Image 3</label>
                <input class="file" type="file" name="image3">
            </div>

            <div>
                <label>Image 4</label>
                <input class="file" type="file" name="image4">
            </div>

            <div>
                <label>Image 5</label>
                <input class="file" type="file" name="image5">
            </div>

            <button type="submit">✨ Generate Website</button>

        </form>

    </div>

</div>
